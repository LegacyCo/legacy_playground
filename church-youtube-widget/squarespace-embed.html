<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  CHURCH YOUTUBE STREAM SWITCHER — Squarespace Code Block     ║
  ║                                                              ║
  ║  Paste this entire file into a Squarespace Code Block.       ║
  ║                                                              ║
  ║  SETUP — fill in the three config values below:              ║
  ║                                                              ║
  ║  1. API_KEY       — YouTube Data API v3 key                  ║
  ║     → console.cloud.google.com → APIs & Services → Creds     ║
  ║     → restrict key to your domain for safety                 ║
  ║                                                              ║
  ║  2. CHANNEL_ID    — Your church's YouTube channel ID         ║
  ║     → youtube.com/@YourChannel → About → Share Channel       ║
  ║     → Copy Channel ID  (starts with UC…)                     ║
  ║                                                              ║
  ║  3. PLAYLIST_ID   — Sermon playlist ID                       ║
  ║     → Open the playlist → copy ID from URL  (starts with PL) ║
  ╚══════════════════════════════════════════════════════════════╝
-->

<style>
  .cp-wrap {
    width: 100%;
    max-width: 100%;
    font-family: inherit;
  }

  /* Config-missing warning banner */
  .cp-config-warn {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 6px;
    padding: 12px 16px;
    font-size: 13px;
    color: #856404;
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .cp-config-warn strong { display: block; margin-bottom: 4px; }
  .cp-config-warn code {
    background: rgba(0,0,0,0.08);
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 12px;
  }

  /* 16:9 responsive iframe container */
  .cp-video {
    position: relative;
    padding-bottom: 56.25%;
    height: 0;
    overflow: hidden;
    border-radius: 8px;
    background: #111;
  }
  .cp-video iframe {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 0;
  }

  /* Placeholder shown before video loads */
  .cp-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #666;
    font-size: 14px;
    gap: 10px;
  }
  .cp-spinner {
    width: 32px; height: 32px;
    border: 3px solid #333;
    border-top-color: #cc0000;
    border-radius: 50%;
    animation: cp-spin 0.8s linear infinite;
  }
  @keyframes cp-spin { to { transform: rotate(360deg); } }

  /* Action row below player */
  .cp-actions {
    margin-top: 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    min-height: 44px; /* prevent layout jump */
  }

  /* Button shared styles */
  .cp-btn {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    padding: 11px 22px;
    border-radius: 6px;
    text-decoration: none;
    font-weight: 600;
    font-size: 15px;
    color: #fff;
    background: #cc0000;
    transition: background 0.2s, transform 0.1s;
    cursor: pointer;
    white-space: nowrap;
  }
  .cp-btn:hover  { background: #aa0000; color: #fff; }
  .cp-btn:active { transform: scale(0.97); }
  .cp-btn--hidden { display: none; }

  /* LIVE badge pill inside button */
  .cp-live-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: rgba(255,255,255,0.25);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    vertical-align: middle;
  }

  /* Radar pulse icon */
  .cp-radar {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }
  .cp-radar__dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #fff;
    position: relative;
    z-index: 2;
  }
  .cp-radar__ring {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.75);
    width: 8px; height: 8px;
    animation: cp-radar-pulse 1.6s ease-out infinite;
  }
  .cp-radar__ring:nth-child(2) { animation-delay: 0s;    }
  .cp-radar__ring:nth-child(3) { animation-delay: 0.55s; }
  .cp-radar__ring:nth-child(4) { animation-delay: 1.1s;  }

  @keyframes cp-radar-pulse {
    0%   { width: 8px;  height: 8px;  opacity: 1; }
    100% { width: 32px; height: 32px; opacity: 0; }
  }

  /* Small status label */
  .cp-status {
    font-size: 13px;
    color: #888;
  }
  .cp-status--error { color: #cc0000; }
</style>

<div class="cp-wrap" id="cpWrap">

  <!-- Config warning — hidden by JS once config is valid -->
  <div class="cp-config-warn" id="cpConfigWarn" style="display:none">
    <strong>⚙️ Setup required</strong>
    Open the Code Block and replace the placeholder values:<br>
    <code>YOUR_YOUTUBE_API_KEY</code> &nbsp;·&nbsp;
    <code>YOUR_CHANNEL_ID</code> &nbsp;·&nbsp;
    <code>YOUR_SERMON_PLAYLIST_ID</code>
  </div>

  <div class="cp-video">
    <iframe
      id="cpIframe"
      src="about:blank"
      allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
      allowfullscreen>
    </iframe>
    <!-- Spinner shown while loading -->
    <div class="cp-placeholder" id="cpPlaceholder">
      <div class="cp-spinner"></div>
      <span>Loading…</span>
    </div>
  </div>

  <div class="cp-actions">
    <a id="cpBtn" class="cp-btn cp-btn--hidden" href="#" target="_blank" rel="noopener"></a>
    <span id="cpStatus" class="cp-status"></span>
  </div>

</div>

<script>
(function () {

  /* ── CONFIG — replace all three values ──────────────────── */
  var API_KEY     = 'YOUR_YOUTUBE_API_KEY';
  var CHANNEL_ID  = 'YOUR_CHANNEL_ID';          // UCxxxxxxxxxxxxxxxx
  var PLAYLIST_ID = 'YOUR_SERMON_PLAYLIST_ID';  // PLxxxxxxxxxxxxxxxx
  var POLL_MS     = 60000; // re-check for live stream every 60 s
  /* ─────────────────────────────────────────────────────────── */

  var iframe      = document.getElementById('cpIframe');
  var btn         = document.getElementById('cpBtn');
  var statusEl    = document.getElementById('cpStatus');
  var placeholder = document.getElementById('cpPlaceholder');
  var configWarn  = document.getElementById('cpConfigWarn');

  var currentId   = null;
  var currentLive = null;

  /* Show the setup warning and stop if config is still placeholder */
  var CONFIG_MISSING =
    API_KEY     === 'YOUR_YOUTUBE_API_KEY'   ||
    CHANNEL_ID  === 'YOUR_CHANNEL_ID'        ||
    PLAYLIST_ID === 'YOUR_SERMON_PLAYLIST_ID';

  if (CONFIG_MISSING) {
    configWarn.style.display = 'block';
    placeholder.querySelector('span').textContent = 'Config not set — see yellow box above.';
    placeholder.querySelector('.cp-spinner').style.display = 'none';
    return; // stop here — nothing else to do
  }

  /* Render the player & button for a given video */
  function render(videoId, live) {
    if (videoId === currentId && live === currentLive) return;
    currentId   = videoId;
    currentLive = live;

    iframe.src = 'https://www.youtube.com/embed/' + videoId
      + '?rel=0&modestbranding=1';

    /* Hide spinner once iframe starts loading */
    iframe.onload = function () {
      placeholder.style.display = 'none';
    };

    btn.href = 'https://www.youtube.com/watch?v=' + videoId;
    btn.classList.remove('cp-btn--hidden');

    if (live) {
      btn.innerHTML =
        '<span class="cp-radar">'
          + '<span class="cp-radar__ring"></span>'
          + '<span class="cp-radar__ring"></span>'
          + '<span class="cp-radar__ring"></span>'
          + '<span class="cp-radar__dot"></span>'
        + '</span>'
        + 'Watch Live <span class="cp-live-badge">Live</span>';
      statusEl.textContent = '';
      statusEl.className = 'cp-status';
    } else {
      btn.innerHTML = '&#9654;&#xFE0E; Watch Latest Sermon';
      statusEl.textContent = 'No live service right now';
      statusEl.className = 'cp-status';
    }
  }

  function showError(msg) {
    placeholder.querySelector('span').textContent = msg;
    placeholder.querySelector('.cp-spinner').style.display = 'none';
    statusEl.textContent = msg;
    statusEl.className = 'cp-status cp-status--error';
  }

  /* YouTube Data API v3 helper */
  function ytGet(endpoint, params, cb) {
    var qs = Object.keys(params)
      .map(function (k) { return k + '=' + encodeURIComponent(params[k]); })
      .join('&');
    fetch('https://www.googleapis.com/youtube/v3/' + endpoint + '?' + qs + '&key=' + API_KEY)
      .then(function (r) { return r.json(); })
      .then(function (data) {
        /* Surface API errors clearly */
        if (data && data.error) {
          showError('YouTube API error: ' + data.error.message);
          cb(null);
        } else {
          cb(data);
        }
      })
      .catch(function (err) {
        showError('Network error — check browser console.');
        cb(null);
      });
  }

  /* Check for an active livestream on the channel */
  function checkLive(cb) {
    ytGet('search', {
      part: 'id',
      channelId: CHANNEL_ID,
      eventType: 'live',
      type: 'video'
    }, function (data) {
      var items = data && data.items;
      cb(items && items.length ? items[0].id.videoId : null);
    });
  }

  /* Fetch the most recent video from the sermon playlist */
  function fetchLatest(cb) {
    ytGet('playlistItems', {
      part: 'snippet',
      playlistId: PLAYLIST_ID,
      maxResults: 1
    }, function (data) {
      var items = data && data.items;
      cb(items && items.length ? items[0].snippet.resourceId.videoId : null);
    });
  }

  /* Main update cycle */
  function update() {
    checkLive(function (liveId) {
      if (liveId) {
        render(liveId, true);
      } else {
        fetchLatest(function (sermonId) {
          if (sermonId) {
            render(sermonId, false);
          } else if (currentId === null) {
            /* Only show error if nothing has ever loaded */
            showError('Could not load video. Check API key, Channel ID, and Playlist ID.');
          }
        });
      }
    });
  }

  update();
  setInterval(update, POLL_MS);

})();
</script>
